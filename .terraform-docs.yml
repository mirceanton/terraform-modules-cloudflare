formatter: markdown table

version: ">= 0.17.0"

sections:
  show:
    - requirements
    - providers
    - resources
    - inputs
    - outputs

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

sort:
  enabled: true
  by: name

settings:
  anchor: true
  default: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  required: true
  sensitive: true
  type: true
