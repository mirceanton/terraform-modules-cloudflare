---
name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  discover:
    name: Discover Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Discover modules
        id: scan
        uses: mirceanton/action-folder-matrix@8e502fabcdf901e955b4e607d91c661bd794734e # v3.0.0
        with:
          path: "./modules"

  publish:
    name: "Publish (${{ matrix.directory }})"
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive module
        working-directory: modules/${{ matrix.directory }}
        run: tar -czf "/tmp/${{ matrix.directory }}.tar.gz" .

      - name: Push module
        env:
          MODULE: ${{ matrix.directory }}
          VERSION: ${{ inputs.version || github.ref_name }}
          REGISTRY: ghcr.io/${{ github.repository }}
        run: |
          oras push "${REGISTRY}/${MODULE}:${VERSION}" \
            --artifact-type "application/vnd.opentofu.modulev1+zip" \
            "/tmp/${MODULE}.tar.gz:application/vnd.opentofu.module.layer.v1.tar+gzip"
