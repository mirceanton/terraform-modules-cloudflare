---
name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  discover:
    name: Discover Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Discover modules
        id: scan
        uses: mirceanton/action-folder-matrix@e95694a82ad200463106846e8492b9a5bc9b5780 # v3.0.3
        with:
          path: "./modules"

  publish:
    name: "Publish (${{ matrix.directory }})"
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive module
        working-directory: modules/${{ matrix.directory }}
        run: tar -czf "/tmp/${{ matrix.directory }}.tar.gz" .

      - name: Push module
        env:
          MODULE: ${{ matrix.directory }}
          VERSION: ${{ inputs.version || github.ref_name }}
          REGISTRY: ghcr.io/${{ github.repository }}
        run: |
          oras push "${REGISTRY}/${MODULE}:${VERSION}" \
            --artifact-type "application/vnd.opentofu.modulev1+zip" \
            --disable-path-validation \
            "/tmp/${MODULE}.tar.gz:application/vnd.opentofu.module.layer.v1.tar+gzip"
